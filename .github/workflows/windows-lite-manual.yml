name: Windows Lite Manual Build

on:
  workflow_dispatch:

jobs:
  build-windows-lite:
    name: Build Windows Lite x64
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Build Windows Lite archive
        run: npm run release:windows-lite:x64:zip

      - name: Upload Windows Lite archive
        uses: actions/upload-artifact@v4
        with:
          name: cloudcli-windows-lite-x64
          path: release/cloudcli-windows-lite-x64.zip
          if-no-files-found: error
